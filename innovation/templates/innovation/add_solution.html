{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="card border-0 shadow-lg p-5 rounded-4">
        <h2 class="fw-bold mb-4 text-success">"{{ idea.title }}" üçün Həll Hazırla</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Həllin Başlığı</label>
                <input type="text" name="title" class="form-control" placeholder="Məs: Alternativ enerji bloku" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Texniki İzah</label>
                <textarea name="description" class="form-control" rows="5" required></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Şəkil (Render)</label>
                    <input type="file" name="image" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Layihə Faylı (PDF)</label>
                    <input type="file" name="file" class="form-control">
                </div>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill mt-3">Həlli Paylaş</button>
        </form>
    </div>
</div>
{% endblock %}
