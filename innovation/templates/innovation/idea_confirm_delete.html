{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-lg p-5" style="border-radius: 25px;">
                <i class="fa-solid fa-triangle-exclamation fa-4x text-danger mb-4"></i>
                <h2 class="fw-bold">İdeyanı silmək?</h2>
                <p class="text-muted">"<strong>{{ idea.title }}</strong>" ideyasını silməyə əminsiniz? Bu əməliyyat geri qaytarıla bilməz.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill fw-bold">Bəli, Sil</button>
                        <a href="{% url 'profile' user.username %}" class="btn btn-light btn-lg rounded-pill fw-bold">Ləğv Et</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
