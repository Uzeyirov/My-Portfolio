{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-7">
        <div class="card border-0 shadow-lg rounded-4 p-5 bg-white">
            <h2 class="fw-bold mb-4 text-center">Yeni Texniki Həll</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Həllin Başlığı</label>
                    <input type="text" name="title" class="form-control py-2" placeholder="Məs: Metro Ventilyasiya Sistemi" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Hədəf Sahə</label>
                    <input type="text" name="target_area" class="form-control py-2" placeholder="Məs: Nəqliyyat" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Geniş Texniki İzah</label>
                    <textarea name="description" class="form-control" rows="5" required></textarea>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Əsas Şəkil (Render)</label>
                        <input type="file" name="image" class="form-control" accept="image/*" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Texniki Fayl (PDF)</label>
                        <input type="file" name="technical_file" class="form-control">
                    </div>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm">Yayımla</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
